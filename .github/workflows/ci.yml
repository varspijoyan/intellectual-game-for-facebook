name: CI

on:
  push:
    branches: [main, backend/setup]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testroot
          MYSQL_DATABASE: fb_soccer_quiz_game
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Wait for MySQL port
        shell: bash
        run: |
          for i in $(seq 1 60); do
            if (echo >/dev/tcp/127.0.0.1/3306) 2>/dev/null; then
              echo "MySQL accepting connections"
              exit 0
            fi
            sleep 1
          done
          echo "MySQL did not become ready in time"
          exit 1

      - name: Unit tests (server)
        run: npm run test

      - name: Migrate & seed
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: "3306"
          MYSQL_USER: root
          MYSQL_PASSWORD: testroot
          MYSQL_DATABASE: fb_soccer_quiz_game
        run: |
          npm run migrate
          npm run seed

      - name: Build
        run: npm run build
